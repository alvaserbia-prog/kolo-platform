<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 480" role="img" aria-label="Српски — ћирилица">
  <!-- Trobojka (ista geometrija kao ostale zastave: 4:3) -->
  <rect width="640" height="480" fill="#fff"/>
  <rect width="640" height="320" fill="#0c4076"/>
  <rect width="640" height="160" fill="#c6363c"/>
  <!-- Grb Srbije, centriran -->
  <g transform="translate(320 248)">
    <!-- Štit -->
    <path d="M-92 -112 H92 V40 C92 104 48 140 0 162 C-48 140 -92 104 -92 40 Z"
          fill="#c6363c" stroke="#fff" stroke-width="10"/>
    <!-- Srpski krst -->
    <rect x="-18" y="-92" width="36" height="208" rx="4" fill="#fff"/>
    <rect x="-74" y="-26" width="148" height="36" rx="4" fill="#fff"/>
    <!-- Četiri ocila (ćirilično „С" oko krsta) -->
    <g fill="none" stroke="#fff" stroke-width="13" stroke-linecap="round">
      <path d="M-30 -58 A26 26 0 0 0 -78 -58"/>
      <path d="M30 -58 A26 26 0 0 1 78 -58"/>
      <path d="M-30 66 A26 26 0 0 1 -78 66"/>
      <path d="M30 66 A26 26 0 0 0 78 66"/>
    </g>
  </g>
</svg>
